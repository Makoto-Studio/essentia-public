<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terms of Service — essentia</title>
    <script>
        var lang = (navigator.language || navigator.userLanguage || 'en').toLowerCase();
        location.replace(lang.startsWith('es') ? '/es/terms/' : '/en/terms/');
    </script>
    <noscript>
        <meta http-equiv="refresh" content="0;url=/en/terms/">
    </noscript>
</head>
<body>
    <p>Redirecting&hellip; <a href="/en/terms/">Continue to Terms of Service</a></p>
</body>
</html>
